meters:
- name: video_credits
  description: Credits consumed generating video, roughly 5 per 30 seconds (Aurora 1/second, Aurora fast 0.5/second).
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - endpoint
  - model_version
- name: audio_credits
  description: Credits consumed generating Text-to-Speech audio, roughly 1 per 30 seconds.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - endpoint
- name: specialized_credits
  description: Credits for specialized jobs (Product-to-Video per image or per 30s, Ad Clone per 5s, AI Scripts per request).
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - endpoint
- name: subscription_fee
  description: Monthly subscription fee that includes the base credit allowance for the plan.
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track credits consumed per endpoint, model version, and account; the credits_used field on each job response is the unit of cost.
- name: Allocation
  description: Attribute credit spend to campaigns/teams by tagging jobs and separating API keys per workload where possible.
- name: Optimization
  description: Prefer preview over full render while iterating, choose Aurora fast for cheaper avatar seconds, keep scripts tight, and batch generation to stay within the plan's credit allowance before buying overage.
- name: Accountability
  description: Assign an owner per subscription/API key and review monthly credit burn against the plan allowance; upgrade tier or negotiate custom credit packages only when sustained overage warrants it.
