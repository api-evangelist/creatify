aid: creatify
url: https://raw.githubusercontent.com/api-evangelist/creatify/refs/heads/main/apis.yml
name: Creatify
kind: company
description: Creatify is an AI avatar and marketing-video generation platform that
  turns product URLs, scripts, images, and text into short-form video ads narrated
  by ultra-realistic AI avatars. The Creatify API (base https://api.creatify.ai/api,
  authenticated with X-API-ID / X-API-KEY headers) exposes AI Avatar (Lipsync v1/v2
  and Aurora image-to-avatar), Link-to-Video, AI Shorts and Custom Template video
  generation, Text-to-Speech and voice cloning, a 1500+ Persona/avatar catalog, a
  voice catalog, and a music library. Generation is asynchronous - create a job,
  then poll the job by id or receive a webhook - with billing metered in credits.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- AI Avatars
- Video Generation
- AI Video
- Generative AI
- Marketing Video
- Text to Speech
- UGC Ads
- AI Avatar
created: '2026-07-11'
modified: '2026-07-11'
specificationVersion: '0.19'
