description: >-
  FinOps view of Creatify spend. Creatify is billed as a monthly subscription
  that includes a credit allowance; all API generation draws down credits, with
  video costing roughly 5 credits per 30 seconds (Aurora 1 credit/second, Aurora
  fast 0.5 credit/second), audio 1 credit per 30 seconds, AI Scripts ~1 credit
  per request, and specialized jobs (Product-to-Video ~2 credits/image or ~10
  credits/30s, Ad Clone ~12 credits per 5s) at their own rates. Cost is therefore
  a function of how much media is generated, not per-API-call. Overage beyond the
  monthly allowance is handled by upgrading tier or buying custom credit packages
  (Enterprise).
notes: >-
  Per-endpoint credit rates are grounded in Creatify's billing docs as of the
  review date and should be reconciled before cost modeling. The dominant cost
  lever is total seconds of video/audio generated and the model version chosen
  (standard vs Aurora vs Aurora fast).
