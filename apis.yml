  description: Turn text or audio plus a chosen avatar/persona into ultra-realistic
    talking-head videos. Lipsync v1 (single scene) and Lipsync v2 (multi-scene, with
    per-scene characters, voices, and backgrounds), plus the Aurora image-to-avatar
    model. Asynchronous - POST to create, then GET the job by id to poll status.
